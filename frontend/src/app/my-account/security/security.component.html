<form #form="ngForm" class="security-form" (ngSubmit)="changePassword(form)">
    <div class="form-field">
        <i class="fa-solid fa-lock"></i>
        <p-floatlabel variant="in">
            <p-password inputId="currentPassword" name="currentPassword" [(ngModel)]="currentPassword"
                [feedback]="false" [toggleMask]="true" required minlength="8" maxlength="20"/>
            <label for="currentPassword">Contraseña actual</label>
        </p-floatlabel>
    </div>

    <div class="form-row">
        <div class="form-field half">
            <i class="fa-solid fa-lock"></i>
            <p-floatlabel variant="in">
                <p-password inputId="password" name="password" [(ngModel)]="newPassword" [feedback]="true"
                    [toggleMask]="true" promptLabel="Introduce una contraseña" weakLabel="Demasiado simple"
                    mediumLabel="Complejidad promedio" strongLabel="Contraseña compleja" required minlength="8" maxlength="20">
                    <ng-template #header>
                        <div class="font-semibold text-xm mb-4">Escoge una contraseña</div>
                    </ng-template>
                    <ng-template #footer>
                        <p-divider />
                        <ul class="pl-2 ml-2 my-0 leading-normal">
                            <li>Al menos una minúscula</li>
                            <li>Al menos una mayúscula</li>
                            <li>Al menos un número</li>
                            <li>Al menos un símbolo</li>
                            <li>Mínimo 8 caracteres</li>
                        </ul>
                    </ng-template>
                </p-password>
                <label for="password">Nueva contraseña</label>
            </p-floatlabel>
        </div>
        <div class="form-field half">
            <i class="fa-solid fa-lock"></i>
            <p-floatlabel variant="in">
                <p-password inputId="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword"
                    [feedback]="false" [toggleMask]="true" required minlength="8" maxlength="20"/>
                <label for="confirmPassword">Confirmar nueva contraseña</label>
            </p-floatlabel>
        </div>
    </div>

    <div class="form-buttons">
        <button type="submit">Actualizar Contraseña</button>
    </div>
</form>
