<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

<div class="profile-background">
    <svg class="am-blob am-top-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path fill="#04bd7d"
            d="M41.3,-61.1C54.2,-51.7,65.5,-40.2,69.5,-26.9C73.4,-13.6,70.1,1.6,63.5,15.9C56.9,30.2,47,43.5,34.5,50.5C22.1,57.5,7,58.2,-6.7,59.2C-20.4,60.1,-32.7,61.3,-42.5,55.4C-52.3,49.5,-59.6,36.4,-64.7,22.5C-69.7,8.6,-72.5,-6.1,-67.8,-18.5C-63.1,-30.9,-50.9,-41,-38.2,-50.4C-25.5,-59.8,-12.8,-68.4,1.6,-70.7C16,-73.1,32.1,-69.4,41.3,-61.1Z"
            transform="translate(100 100)" />
    </svg>

    <svg class="am-blob am-bottom-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path fill="#04bd7d"
            d="M44.8,-64.2C57.7,-54.3,66.2,-38.2,68.8,-22.6C71.4,-7,68.1,8.1,61.4,22.3C54.8,36.4,44.9,49.6,32.4,58.5C19.9,67.3,5,71.9,-8.6,73.3C-22.1,74.7,-34.2,72.9,-43.3,64.6C-52.5,56.2,-58.7,41.4,-64.6,26.5C-70.5,11.6,-76.1,-3.4,-73.7,-17.2C-71.4,-31,-61.2,-43.5,-48.6,-53.6C-36,-63.6,-21,-71.2,-5.3,-66.8C10.5,-62.3,21,-45.8,44.8,-64.2Z"
            transform="translate(100 100)" />
    </svg>

    <div class="am-blob-1"></div>
    <div class="am-blob-2"></div>
    <div class="am-blob-3"></div>

    <div class="am-circle-top-left"></div>
    <div class="am-circle-bottom-right"></div>

    <div class="profile-container">
        <h1 *ngIf="activeSection === 'profile'">Mi Cuenta</h1>
        <h1 *ngIf="activeSection === 'security'">Cambiar Contraseña</h1>
        <h1 *ngIf="activeSection === 'creator'">Subir Contenido</h1>

        <div class="section-tabs">
            <button [class.active]="activeSection === 'profile'" (click)="activeSection = 'profile'">Perfil</button>
            <button [class.active]="activeSection === 'security'" (click)="activeSection = 'security'">Seguridad</button>
            <button [class.active]="activeSection === 'creator'" (click)="activeSection = 'creator'" *ngIf="!isUserCreator">Modo Creador</button>
        </div>

        <div *ngIf="activeSection === 'profile'" class="profile-form">
            <app-profile></app-profile>
        </div>

        <div *ngIf="activeSection === 'security'" class="profile-form">
            <app-security></app-security>
        </div>

        <div *ngIf="activeSection === 'creator'" class="profile-form">
            <app-content-creator></app-content-creator>
        </div>
    </div>
</div>
