spring.application.name=TiendaAplicaciones
app.base-url=http://localhost:8080

spring.datasource.url=jdbc:postgresql://localhost:5432/AppStore
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=50GB
spring.servlet.multipart.max-request-size=50GB

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#JWT Token Configuration
jwt.
jwt.expiration.short=86400000
jwt.expiration.long=1209600000