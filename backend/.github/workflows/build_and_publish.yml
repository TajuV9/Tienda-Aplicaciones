name: Build and publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          architecture: x64
        
      - name: Set permissions to run maven
        run: chmod +x ./mvnw

      - name: Maven build
        run: ./mvnw clean package -Pprod -DskipTests

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar

  publish:
    name: Publish JAR on release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: ./target

      - name: Upload JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-docker:
    name: Generate and publish docker container
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: ./target

      - name: Set lowercase variables
        id: vars
        run: |
          repo_owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_name_lower=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          tag_lower=$(echo "${{ github.event.release.tag_name }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          echo "repo_owner_lower=$repo_owner_lower" >> $GITHUB_OUTPUT
          echo "repo_name_lower=$repo_name_lower" >> $GITHUB_OUTPUT
          echo "tag_lower=$tag_lower" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.repo_owner_lower }}/${{ steps.vars.outputs.repo_name_lower }}/appxtract-backend:${{ steps.vars.outputs.tag_lower }}

  append-instructions:
    name: Append deployment instructions to relese comment
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read markdown content
        id: read-md
        run: |
          content=$(cat DEPLOYMENT.md)
          echo "content<<EOF" >> $GITHUB_ENV
          echo "$content" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Append markdown content to release
        uses: djn24/add-comment-to-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment: ${{ env.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      

